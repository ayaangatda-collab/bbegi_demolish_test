<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>철거·원상복구 간편 접수</title>
  <style>
    /* 🎨 빼기 브랜드 컬러 시스템 (Design Tokens) */
    :root {
      /* Primary Blue Palette */
      --blue-01: #1F41FF; /* Primary Main */
      --blue-02: #304FFB; /* Primary Hover */
      --blue-03: #5980F9; /* Focus Border */
      --blue-04: #8fb5ff; /* Secondary */
      --blue-05: #E6F0FF; /* Focus Background */
      --blue-06: #F4F9FF; /* Page Background */
      
      /* Text & Neutral Colors */
      --gray-900: #1a1a1a; /* Primary Text */
      --gray-800: #333333; /* Label Text */
      --gray-600: #666666; /* Secondary Text */
      --gray-400: #999999; /* Placeholder */
      --gray-300: #e0e0e0; /* Border */
      --white: #ffffff;
      
      /* Status Colors */
      --error: #e74c3c;
      --success: #00c896;
      
      /* Design System */
      --radius: 8px;
      --shadow: 0 2px 8px rgba(31, 65, 255, 0.08);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, var(--blue-06) 0%, var(--white) 100%);
      color: var(--gray-900);
      padding: 24px 20px;
      line-height: 1.6;
      min-height: 100vh;
    }
    
    .container {
      max-width: 400px;
      margin: 0 auto;
      background: var(--white);
      padding: 32px 28px;
      border-radius: 16px;
      box-shadow: var(--shadow);
    }
    
    .logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--blue-01);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    
    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.3;
      letter-spacing: -0.5px;
      color: var(--gray-900);
    }
    
    .subtitle {
      font-size: 15px;
      color: var(--gray-600);
      margin-bottom: 36px;
      line-height: 1.6;
      letter-spacing: -0.2px;
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--gray-800);
      letter-spacing: -0.2px;
    }
    
    .form-group input[type="text"],
    .form-group input[type="tel"] {
      width: 100%;
      padding: 16px;
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius);
      font-size: 16px;
      color: var(--gray-900);
      background: var(--white);
      outline: none;
      transition: all 0.2s ease;
    }
    
    .form-group input:focus {
      border-color: var(--blue-01);
      background: var(--blue-05);
      box-shadow: 0 0 0 3px rgba(31, 65, 255, 0.1);
    }
    
    .form-group input::placeholder {
      color: var(--gray-400);
    }
    
    .privacy-group {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 32px;
      padding: 16px;
      background: var(--blue-06);
      border-radius: var(--radius);
      border: 1px solid var(--blue-05);
    }
    
    .privacy-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: var(--blue-01);
      cursor: pointer;
    }
    
    .privacy-group label {
      font-size: 14px;
      color: var(--gray-600);
      line-height: 1.5;
      cursor: pointer;
      letter-spacing: -0.2px;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--blue-01) 0%, var(--blue-02) 100%);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: -0.2px;
      box-shadow: 0 4px 12px rgba(31, 65, 255, 0.2);
    }
    
    .submit-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--blue-02) 0%, var(--blue-03) 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(31, 65, 255, 0.3);
    }
    
    .submit-btn:active:not(:disabled) {
      transform: translateY(0);
    }
    
    .submit-btn:disabled {
      background: var(--gray-300);
      color: var(--gray-400);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .success-screen {
      display: none;
      text-align: center;
      padding-top: 40px;
    }
    
    .success-screen .icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: bounce 0.6s ease;
    }
    
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }
    
    .success-screen h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--blue-01);
      letter-spacing: -0.3px;
    }
    
    .success-screen p {
      font-size: 15px;
      color: var(--gray-600);
      line-height: 1.6;
      letter-spacing: -0.2px;
    }
    
    .error-message {
      color: var(--error);
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      display: none;
      font-weight: 500;
      letter-spacing: -0.1px;
    }

    /* 반응형 디자인 */
    @media (max-width: 480px) {
      body {
        padding: 16px 12px;
      }
      
      .container {
        padding: 24px 20px;
      }
      
      .logo {
        font-size: 24px;
      }
      
      .title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- 접수 폼 화면 -->
  <div id="formScreen" class="container">
    <div class="logo">빼기</div>
    <h1 class="title">철거·원상복구<br>간편 접수</h1>
    <p class="subtitle">
      이름과 연락처만 남겨주시면<br>
      빼기 전담 매니저가 직접 연락드려<br>
      최적의 업체를 연결해드립니다.
    </p>

    <form id="simpleForm">
      <div class="form-group">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" placeholder="이름을 입력해주세요" required>
      </div>

      <div class="form-group">
        <label for="phone">연락처</label>
        <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" required>
      </div>

      <div class="privacy-group">
        <input type="checkbox" id="consent" name="consent" required>
        <label for="consent">
          <strong>[필수]</strong> 개인정보 수집·이용 동의<br>
          <span style="font-size: 13px; opacity: 0.8;">수집 항목: 이름, 연락처 / 목적: 서비스 상담</span>
        </label>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        접수하기
      </button>
      
      <div class="error-message" id="errorMessage"></div>
    </form>
  </div>

  <!-- 접수 완료 화면 -->
  <div class="success-screen" id="successScreen">
    <div class="icon">✅</div>
    <h2>접수가 완료되었습니다!</h2>
    <p>
      빼기 전담 매니저가<br>
      영업일 기준 1~2일 내에 연락드려<br>
      최적의 업체를 직접 연결해드릴게요.
    </p>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzwnJBbp45WRcRamDKfSozzh6Dg3Z2oPcFIZxcrsUf_XUkrhYjT0pm7YeBsyS60sapcmw/exec';
    
    document.getElementById('simpleForm').addEventListener('submit', async function(e) {
      e.preventDefault();
    
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const consent = document.getElementById('consent').checked;
      
      const submitBtn = document.getElementById('submitBtn');
      const errorMessage = document.getElementById('errorMessage');
    
      errorMessage.style.display = 'none';
    
      // 유효성 검사
      if (!name) {
        showError('이름을 입력해주세요.');
        return;
      }
      if (!phone) {
        showError('연락처를 입력해주세요.');
        return;
      }
      if (!consent) {
        showError('개인정보 수집·이용에 동의해주세요.');
        return;
      }
    
      const phoneRegex = /^[0-9-+\s()]{10,15}$/;
      if (!phoneRegex.test(phone)) {
        showError('올바른 전화번호 형식을 입력해주세요.');
        return;
      }
    
      submitBtn.disabled = true;
      submitBtn.textContent = '접수 중...';
    
      try {
        // ✅ FormData 방식으로 변경 (CORS 문제 완전 해결)
        const formData = new FormData();
        formData.append('name', name);
        formData.append('phone', phone);
        formData.append('consent', consent ? 'true' : 'false');
    
        await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData,      // JSON 대신 FormData 사용
          mode: 'no-cors'      // headers 제거
        });
    
        showSuccessScreen();
    
      } catch (error) {
        console.error('제출 오류:', error);
        showError('접수 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
        
        submitBtn.disabled = false;
        submitBtn.textContent = '접수하기';
      }
    });
    
    function showError(message) {
      const errorMessage = document.getElementById('errorMessage');
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
    }
    
    function showSuccessScreen() {
      document.getElementById('formScreen').style.display = 'none';
      document.getElementById('successScreen').style.display = 'block';
    }
  </script>
</body>
</html>
